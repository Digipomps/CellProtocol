name: CellProtocol Swift Linux

on:
  pull_request:
    paths:
      - ".github/workflows/cellprotocol-swift-linux.yml"
      - "Package.swift"
      - "Package.resolved"
      - "Sources/**"
      - "Tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cellprotocol-swift-linux.yml"
      - "Package.swift"
      - "Package.resolved"
      - "Sources/**"
      - "Tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cellprotocol-swift-linux-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  persisted-cell-file-bounds:
    name: Persisted Cell file bounds
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out exact revision
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Verify toolchain and immutable dependencies
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          test -f Package.resolved
          if grep -Eq '"kind"[[:space:]]*:[[:space:]]*"localSourceControl"' Package.resolved; then
            echo "Package.resolved contains a local source-control dependency" >&2
            exit 1
          fi

      - name: Compile and test descriptor bounds on Linux
        shell: bash
        run: |
          set -euo pipefail
          swiftc \
            -parse-as-library \
            Sources/CellBase/PersistingCells/PersistedCellFileIO.swift \
            Tests/Linux/PersistedCellFileIOLinuxMain.swift \
            -o "${RUNNER_TEMP}/persisted-cell-file-io-linux"
          "${RUNNER_TEMP}/persisted-cell-file-io-linux"

      - name: Compile and test device ingress authority on Linux
        shell: bash
        run: |
          set -euo pipefail
          swift test \
            --disable-sandbox \
            --disable-automatic-resolution \
            --jobs 2 \
            --filter DeviceIngress

      - name: Prove transport cannot invoke staged authority API
        shell: bash
        run: |
          set -euo pipefail
          module_dir="$(find .build -type d -path '*/debug/Modules' -print -quit)"
          test -n "$module_dir"
          diagnostic_path="${RUNNER_TEMP}/device-ingress-public-api-negative.txt"
          if swiftc \
            -typecheck \
            -I "$module_dir" \
            Tests/Linux/DeviceIngressPublicAPINegative.swift \
            2>"$diagnostic_path"; then
            echo "Transport unexpectedly compiled against staged authority API" >&2
            exit 1
          fi
          grep -q "cannot find 'DeviceIngressResolverAuthorizer' in scope" \
            "$diagnostic_path"

      - name: Verify source and dependency lock remained unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- Package.swift Package.resolved Sources Tests
