name: CellProtocol Swift Linux

on:
  pull_request:
    paths:
      - ".github/workflows/cellprotocol-swift-linux.yml"
      - "Package.swift"
      - "Package.resolved"
      - "Sources/**"
      - "Tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cellprotocol-swift-linux.yml"
      - "Package.swift"
      - "Package.resolved"
      - "Sources/**"
      - "Tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cellprotocol-swift-linux-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  persisted-cell-file-bounds:
    name: Persisted Cell file bounds
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out exact revision
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Verify toolchain and immutable dependencies
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          test -f Package.resolved
          if grep -Eq '"kind"[[:space:]]*:[[:space:]]*"localSourceControl"' Package.resolved; then
            echo "Package.resolved contains a local source-control dependency" >&2
            exit 1
          fi

      - name: Compile and test descriptor bounds on Linux
        shell: bash
        run: |
          set -euo pipefail
          swiftc \
            -parse-as-library \
            Sources/CellBase/PersistingCells/PersistedCellFileIO.swift \
            Tests/Linux/PersistedCellFileIOLinuxMain.swift \
            -o "${RUNNER_TEMP}/persisted-cell-file-io-linux"
          "${RUNNER_TEMP}/persisted-cell-file-io-linux"

      - name: Compile and test device ingress authority on Linux
        shell: bash
        run: |
          set -euo pipefail
          gate_root="${RUNNER_TEMP}/device-ingress-linux"
          mkdir -p \
            "${gate_root}/Sources" \
            "${gate_root}/Tests/DeviceIngressLinuxTests" \
            "${gate_root}/Tests/DeviceIngressLinuxTests/Fixtures" \
            "${gate_root}/Tests/DeviceIngressTransportProbe" \
            "${gate_root}/Tests/DeviceIngressCompositionRootProbe"
          cp Tests/Linux/DeviceIngressLinuxPackage.swift "${gate_root}/Package.swift"
          cp Tests/Linux/VaporIdentityVaultLinuxPackage.resolved \
            "${gate_root}/Package.resolved"
          cp -R Sources/CellBase "${gate_root}/Sources/CellBase"
          cp -R Sources/CombineHelpers "${gate_root}/Sources/CombineHelpers"
          cp -R Sources/CodableHelpers "${gate_root}/Sources/CodableHelpers"
          cp -R commons/schemas/haven.core/Sources/HavenCoreSchemas \
            "${gate_root}/Sources/HavenCoreSchemas"
          cp -R commons/resolver/taxonomy-resolver/Sources/TaxonomyResolver \
            "${gate_root}/Sources/TaxonomyResolver"
          cp -R commons/resolver/keypath-resolver/Sources/KeyPathResolver \
            "${gate_root}/Sources/KeyPathResolver"
          cp Tests/CellBaseTests/DeviceIngressContractTests.swift \
            "${gate_root}/Tests/DeviceIngressLinuxTests/"
          cp Tests/CellBaseTests/DeviceIngressWireFixtureTests.swift \
            "${gate_root}/Tests/DeviceIngressLinuxTests/"
          cp Tests/CellBaseTests/Fixtures/DeviceIngress*.b64 \
            "${gate_root}/Tests/DeviceIngressLinuxTests/Fixtures/"
          cp Tests/CellBaseTests/TestSupport/MockCellResolver.swift \
            "${gate_root}/Tests/DeviceIngressLinuxTests/"
          cp Tests/Linux/DeviceIngressPublicAPINegative.swift \
            "${gate_root}/Tests/DeviceIngressTransportProbe/"
          cp Tests/Linux/DeviceIngressCompositionRootPositive.swift \
            "${gate_root}/Tests/DeviceIngressCompositionRootProbe/"
          swift test \
            --package-path "${gate_root}" \
            --disable-sandbox \
            --disable-automatic-resolution \
            --jobs 2

      - name: Prove transport cannot invoke staged authority API
        shell: bash
        run: |
          set -euo pipefail
          gate_root="${RUNNER_TEMP}/device-ingress-linux"
          diagnostic_path="${RUNNER_TEMP}/device-ingress-public-api-negative.txt"
          swift build \
            --package-path "${gate_root}" \
            --target DeviceIngressTransportProbe \
            --disable-sandbox \
            --disable-automatic-resolution \
            --jobs 2
          swift build \
            --package-path "${gate_root}" \
            --target DeviceIngressCompositionRootProbe \
            --disable-sandbox \
            --disable-automatic-resolution \
            --jobs 2
          if swift build \
            --package-path "${gate_root}" \
            --target DeviceIngressTransportProbe \
            --disable-sandbox \
            --disable-automatic-resolution \
            --jobs 2 \
            -Xswiftc -D \
            -Xswiftc ATTEMPT_AUTHORITY_BYPASS \
            >"$diagnostic_path" 2>&1; then
            echo "Transport unexpectedly compiled against staged authority API" >&2
            exit 1
          fi
          test -s "$diagnostic_path"

      - name: Verify source and dependency lock remained unchanged
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- Package.swift Package.resolved Sources Tests
